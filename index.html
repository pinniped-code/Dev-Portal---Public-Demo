    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

const Badge = ({ children, color = 'gray' }) => {
  const colors = {
    green: 'bg-emerald-100 text-emerald-700',
    yellow: 'bg-amber-100 text-amber-700',
    red: 'bg-red-100 text-red-700',
    blue: 'bg-blue-100 text-blue-700',
    teal: 'bg-teal-100 text-teal-700',
    navy: 'bg-navy-100 text-navy-600',
    gray: 'bg-slate-100 text-slate-600',
    purple: 'bg-purple-100 text-purple-700',
  };
  return <span className={`badge ${colors[color]}`}>{children}</span>;
};

const StatusBadge = ({ status }) => {
  if (status === 'on-track') return <Badge color="green">● On Track</Badge>;
  if (status === 'at-risk') return <Badge color="yellow">● At Risk</Badge>;
  if (status === 'blocked') return <Badge color="red">● Blocked</Badge>;
  if (status === 'running') return <Badge color="teal">● Running</Badge>;
  if (status === 'idle') return <Badge color="yellow">● Idle</Badge>;
  if (status === 'stopped') return <Badge color="gray">● Stopped</Badge>;
  if (status === 'active') return <Badge color="green">Active</Badge>;
  if (status === 'warning') return <Badge color="yellow">Near Limit</Badge>;
  return <Badge>{status}</Badge>;
};

const PhaseBadge = ({ phase }) => {
  const colors = ['blue','teal','purple','red','yellow','green'];
  return <Badge color={colors[phase-1] || 'gray'}>Phase {phase}: {PHASES[phase-1]}</Badge>;
};

const Button = ({ children, variant = 'primary', size = 'md', onClick, className = '', icon }) => {
  const base = 'inline-flex items-center gap-2 font-medium rounded-lg transition-all duration-150 cursor-pointer';
  const variants = {
    primary: 'bg-teal-500 text-white hover:bg-teal-600 shadow-sm',
    secondary: 'bg-white text-navy-600 border border-slate-200 hover:bg-slate-50',
    navy: 'bg-navy-600 text-white hover:bg-navy-700 shadow-sm',
    ghost: 'text-slate-500 hover:bg-slate-100',
    danger: 'bg-red-500 text-white hover:bg-red-600',
  };
  const sizes = { sm: 'px-3 py-1.5 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-5 py-2.5 text-sm' };
  return (
    <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} onClick={onClick}>
      {icon && <Icon name={icon} size={size === 'sm' ? 14 : 16} />}
      {children}
    </button>
  );
};

const ProgressBar = ({ value, max, color = 'teal' }) => {
  const pct = Math.min(100, Math.round((value / max) * 100));
  const colorMap = { teal: 'bg-teal-500', blue: 'bg-blue-500', red: 'bg-red-500', amber: 'bg-amber-500', navy: 'bg-navy-600' };
  const bgColor = pct > 90 ? 'bg-red-500' : pct > 70 ? 'bg-amber-500' : colorMap[color];
  return (
    <div className="progress-bar w-full">
      <div className={`progress-fill ${bgColor}`} style={{ width: `${pct}%` }} />
    </div>
  );
};

const LifecycleStepper = ({ current, compact }) => (
  <div className={`flex items-start ${compact ? 'gap-0' : 'gap-0'}`}>
    {PHASES.map((phase, i) => {
      const num = i + 1;
      const isDone = num < current;
      const isActive = num === current;
      const isFuture = num > current;
      return (
        <React.Fragment key={i}>
          <div className={`flex flex-col items-center ${compact ? 'min-w-[60px]' : 'min-w-[100px]'}`}>
            <div className={`w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm border-2 transition-all
              ${isDone ? 'bg-teal-500 border-teal-500 text-white' :
                isActive ? 'bg-navy-600 border-navy-600 text-white ring-4 ring-navy-100' :
                'bg-white border-slate-200 text-slate-400'}`}>
              {isDone ? <Icon name="check" size={16} /> : num}
            </div>
            {!compact && (
              <div className="mt-2 text-center">
                <p className={`text-xs font-medium ${isActive ? 'text-navy-600' : isDone ? 'text-teal-600' : 'text-slate-400'}`}>
                  {phase.split(' & ')[0]}
                </p>
                {isActive && <p className="text-xs text-teal-500 mt-0.5">{PHASE_MODELS[i]}</p>}
              </div>
            )}
          </div>
          {i < PHASES.length - 1 && (
            <div className={`phase-connector mt-4 ${isDone ? 'done' : ''}`} />
          )}
        </React.Fragment>
      );
    })}
  </div>
);

// ─────────────────────────────────────────────
const SparkLine = ({ data, color = '#0D9488', height = 40, width = 120 }) => {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x},${y}`;
  });
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width={width} height={height}>
      <polyline points={pts.join(' ')} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
};

const BarChart = ({ data, height = 120 }) => {
  const max = Math.max(...data.map(d => d.value));
  return (
    <div className="flex items-end gap-1" style={{ height }}>
      {data.map((d, i) => (
        <div key={i} className="flex flex-col items-center flex-1 gap-1">
          <div className="w-full rounded-t flex flex-col justify-end" style={{ height: height - 20, position: 'relative' }}>
            <div className="bar-chart-bar rounded-t w-full" style={{
              height: `${(d.value / max) * 100}%`, background: d.active ? '#0D9488' : '#E2E8F0'
            }} />
          </div>
          <span className="text-xs text-slate-400" style={{ fontSize: 9 }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
};

const DonutSlice = ({ pct, color, offset }) => {
  const r = 40, cx = 50, cy = 50;
  const circ = 2 * Math.PI * r;
  return (
    <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="18"
      strokeDasharray={`${pct / 100 * circ} ${circ}`}
      strokeDashoffset={-offset / 100 * circ}
      transform="rotate(-90 50 50)" />
  );
};

const DonutChart = ({ data }) => {
  let offset = 0;
  return (
    <div className="flex items-center gap-6">
      <svg viewBox="0 0 100 100" width="100" height="100" className="flex-shrink-0">
        {data.map((d, i) => {
          const slice = <DonutSlice key={i} pct={d.pct} color={d.color} offset={offset} />;
          offset += d.pct;
          return slice;
        })}
      </svg>
      <div className="flex flex-col gap-1.5 flex-1">
        {data.map((d, i) => (
          <div key={i} className="flex items-center gap-2">
            <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ background: d.color }} />
            <span className="text-xs text-slate-600 flex-1">{d.model}</span>
            <span className="text-xs font-semibold text-navy-600">{d.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
};

                  {tc.enabled.map(m => <ModelTag key={m} model={m} />)}
                  {tc.disabled.map(m => (
                    <span key={m} className="badge bg-slate-100 text-slate-300 line-through">{m}</span>
                  ))}
                </div>
                <Button variant="ghost" size="sm">Edit</Button>
              </div>
            </Card>
          ))}
        </div>
      )}

      {tab === 'policies' && (
        <div className="space-y-4">
          <Card className="p-5">
            <p className="text-sm font-semibold text-navy-600 mb-4">Platform Policies</p>
            <div className="space-y-4 divide-y divide-slate-50">
              {[
                { key: 'semanticCache', label: 'Semantic Caching', desc: 'Cache AI responses by semantic similarity to reduce redundant API calls' },
                { key: 'promptFilter', label: 'Prompt Injection Filter', desc: 'Block common prompt injection patterns at the gateway layer' },
                { key: 'auditLog', label: 'Full Audit Logging', desc: 'Log all AI interactions with user, model, token, and cost metadata' },
                { key: 'autoShutdown', label: 'Auto-Shutdown Sandboxes', desc: 'Automatically stop idle sandbox environments after 2 hours' },
                { key: 'budgetAlerts', label: 'Budget Alerts', desc: 'Notify users and managers when spending reaches 80% and 95% of budget' },
              ].map(p => (
                <div key={p.key} className="flex items-center justify-between pt-4 first:pt-0">
                  <div>
                    <p className="text-sm font-medium text-slate-700">{p.label}</p>
                    <p className="text-xs text-slate-400 mt-0.5">{p.desc}</p>
                  </div>
                  <label className="toggle flex-shrink-0">
                    <input type="checkbox" checked={toggles[p.key]}
                      onChange={() => setToggles(t => ({...t, [p.key]: !t[p.key]}))} />
                    <span className="toggle-slider" />
                  </label>
                </div>
              ))}
            </div>
          </Card>

          <Card className="p-5">
            <p className="text-sm font-semibold text-navy-600 mb-3">Compliance Templates</p>
            {[
              { name: 'SOC2 Type II', desc: 'Restricts data storage, enforces audit logging, limits model selection', status: 'Available' },
              { name: 'HIPAA Safe Harbor', desc: 'Prevents PHI from entering AI prompts; requires on-Azure model routing only', status: 'Available' },
              { name: 'FedRAMP Moderate', desc: 'Azure Government cloud routing; restricted model list; enhanced logging', status: 'Coming Soon' },
            ].map(c => (
              <div key={c.name} className="flex items-center justify-between p-3 hover:bg-slate-50 rounded-lg">
                <div>
                  <p className="text-sm font-medium text-slate-700">{c.name}</p>
                  <p className="text-xs text-slate-400">{c.desc}</p>
                </div>
                <Button variant={c.status === 'Coming Soon' ? 'ghost' : 'secondary'} size="sm" disabled={c.status === 'Coming Soon'}>
                  {c.status === 'Coming Soon' ? 'Soon' : 'Apply'}
                </Button>
              </div>
            ))}
          </Card>
        </div>
      )}
    </div>
  );
};

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
const Sidebar = ({ currentPage, onNavigate, role, onRoleChange, collapsed, onToggle }) => {
  const navItems = [
    { id: 'dashboard', icon: 'home', label: 'Dashboard', roles: ['all'] },
    { id: 'projects', icon: 'folder', label: 'Projects', roles: ['all'] },
    { id: 'lifecycle', icon: 'layers', label: 'Lifecycle Tracker', roles: ['all'] },
    { id: 'workspace', icon: 'terminal', label: 'Dev Workspace', roles: ['Developer', 'CoE Admin'] },
    { id: 'requirements', icon: 'book', label: 'Requirements', roles: ['Business Analyst', 'Product Owner', 'Project Manager', 'CoE Admin'] },
    { id: 'analytics', icon: 'chart', label: 'Analytics', roles: ['Leadership', 'Project Manager', 'CoE Admin'] },
    { id: 'admin', icon: 'shield', label: 'Admin Console', roles: ['CoE Admin', 'Leadership'] },
  ];

  const visible = navItems.filter(n => n.roles.includes('all') || n.roles.includes(role));

  return (
    <div className={`flex flex-col bg-navy-600 h-screen flex-shrink-0 transition-all duration-200 ${collapsed ? 'w-16' : 'w-60'}`}>
      {/* Logo */}
      {collapsed ? (
        <div className="flex items-center justify-center border-b border-navy-500 h-16">
          <button className="w-9 h-9 bg-teal-500 rounded-lg flex items-center justify-center text-white hover:bg-teal-400 transition-colors" onClick={onToggle} title="Expand sidebar">
            <Icon name="chevronRight" size={18} />
          </button>
        </div>
      ) : (
        <div className="flex items-center gap-3 px-4 border-b border-navy-500 h-16">
          <div className="w-8 h-8 bg-teal-500 rounded-lg flex items-center justify-center flex-shrink-0">
            <Icon name="robot" size={16} className="text-white" />
          </div>
          <span className="text-white font-bold text-sm leading-tight flex-1">AI Dev<br/>Portal</span>
          <button className="text-navy-300 hover:text-white transition-colors" onClick={onToggle} title="Collapse sidebar">
            <Icon name="chevronDown" size={16} />
          </button>
        </div>
      )}

      {/* Role switcher */}
      {!collapsed && (
        <div className="px-3 py-3 border-b border-navy-500">
          <p className="text-xs text-navy-300 mb-1.5 px-1">Viewing as</p>
          <select className="w-full bg-navy-700 text-white text-xs rounded-lg px-2 py-1.5 border border-navy-500 outline-none cursor-pointer"
            value={role} onChange={e => onRoleChange(e.target.value)}>
            {ROLES.map(r => <option key={r} value={r}>{r}</option>)}
          </select>
        </div>
      )}

      {/* Nav */}
      <nav className="flex-1 py-3 overflow-y-auto">
        {visible.map(item => (
          <button key={item.id} onClick={() => onNavigate(item.id)}
            className={`sidebar-nav-item w-full flex items-center gap-3 px-4 py-2.5 text-sm rounded-none
              ${currentPage === item.id
                ? 'bg-navy-700 text-white border-l-2 border-teal-400'
                : 'text-navy-200 hover:bg-navy-700 hover:text-white'}`}>
            <Icon name={item.icon} size={18} className="flex-shrink-0" />
            {!collapsed && <span>{item.label}</span>}
          </button>
        ))}
      </nav>

      {/* Bottom */}
      <div className="p-3 border-t border-navy-500">
        {!collapsed && (
          <div className="flex items-center gap-2 px-1 mb-3">
            <div className="w-7 h-7 bg-teal-500 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0">AM</div>
            <div className="min-w-0">
              <p className="text-xs text-white font-medium truncate">Alex Morgan</p>
              <p className="text-xs text-navy-300 truncate">alex.morgan@example.com</p>
            </div>
          </div>
        )}
        <button className="sidebar-nav-item w-full flex items-center gap-3 px-1 py-2 text-navy-300 hover:text-white text-sm">
          <Icon name="settings" size={18} />
          {!collapsed && <span>Settings</span>}
        </button>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────
// TOP BAR
// ─────────────────────────────────────────────
const TopBar = ({ page, onNavigate }) => {
  const crumbs = {
    dashboard: ['Dashboard'],
    projects: ['Projects'],
    lifecycle: ['Projects', 'Lifecycle Tracker'],
    workspace: ['Developer Workspace'],
    requirements: ['Requirements Workspace'],
    analytics: ['Analytics'],
    admin: ['Admin Console'],
  };
  const labels = crumbs[page] || ['Dashboard'];
  return (
    <div className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 flex-shrink-0">
      <div className="flex items-center gap-2 text-sm">
        {labels.map((l, i) => (
          <React.Fragment key={i}>
            {i > 0 && <Icon name="chevronRight" size={14} className="text-slate-300" />}
            <span className={i === labels.length - 1 ? 'font-semibold text-navy-600' : 'text-slate-400'}>{l}</span>
          </React.Fragment>
        ))}
      </div>
      <div className="flex items-center gap-3">
        <div className="relative">
          <Icon name="search" size={16} className="absolute left-3 top-2.5 text-slate-400" />
          <input className="pl-9 pr-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg w-56 outline-none focus:ring-2 focus:ring-teal-200 focus:border-teal-400" placeholder="Search…" />
        </div>
        <button className="relative p-2 rounded-lg hover:bg-slate-100 text-slate-500">
          <Icon name="bell" size={18} />
          <span className="absolute top-1 right-1 w-2 h-2 bg-red-400 rounded-full" />
        </button>
        <button className="p-2 rounded-lg hover:bg-slate-100 text-slate-500">
          <Icon name="info" size={18} />
        </button>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────
const App = () => {
  const [page, setPage] = React.useState('dashboard');
  const [role, setRole] = React.useState('Project Manager');
  const [collapsed, setCollapsed] = React.useState(false);
  const [selectedProject, setSelectedProject] = React.useState(null);

  const navigate = (p, data) => {
    setPage(p);
    if (data) setSelectedProject(data);
  };

  const roleDefaultPage = {
    'Developer': 'workspace',
    'Business Analyst': 'requirements',
    'Leadership': 'analytics',
    'CoE Admin': 'admin',
  };

  const handleRoleChange = (r) => {
    setRole(r);
    setPage(roleDefaultPage[r] || 'dashboard');
  };

  const renderPage = () => {
    switch (page) {
      case 'dashboard': return <DashboardPage role={role} onNavigate={navigate} />;
      case 'projects': return <ProjectsPage onNavigate={navigate} />;
      case 'lifecycle': return <LifecyclePage project={selectedProject} />;
      case 'workspace': return <WorkspacePage />;
      case 'requirements': return <RequirementsPage />;
      case 'analytics': return <AnalyticsPage />;
      case 'admin': return <AdminPage />;
      default: return <DashboardPage role={role} onNavigate={navigate} />;
    }
  };

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar currentPage={page} onNavigate={navigate} role={role}
        onRoleChange={handleRoleChange} collapsed={collapsed} onToggle={() => setCollapsed(!collapsed)} />
      <div className="flex flex-col flex-1 min-w-0 overflow-hidden">
        <TopBar page={page} onNavigate={navigate} />
        <main className="flex-1 overflow-y-auto p-6">
          {renderPage()}
        </main>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
